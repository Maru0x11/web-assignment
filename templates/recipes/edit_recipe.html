<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratatoulle | Edit Recipe</title>
    <link href="src/styles.css" rel="stylesheet">
    <script src="src/edit_recipes.js" defer></script>
</head>
<body>

  <nav class="nav-bar-admin">
    <ul>
      <li><a href="index_admin.html">Home</a></li>
      <li><a href="manage_recipes.html">Manage Recipes</a></li>
      <li><a href="add_recipe.html">Add Recipes</a></li>
      <li><a href="login.html">Log Out</a></li>
    </ul>
  </nav>

<main class="main-add-recipe">
    <h1>Edit Recipe</h1>
    <p class="subtitle-text"><strong>Admin access only.</strong> Modify the recipe details below and save your changes.</p>

    <p id="submit-message">Recipe updated successfully!</p>

    <form id="editForm" action="manage_recipes.html" method="get">

        <div class="form-card">
            <h3>Basic Information</h3>

            <div class="form-group-add-recipe">
                <label for="recipe_id">Recipe ID</label>
                <input type="text" id="recipe_id" name="recipe_id" value="1" readonly>
            </div>

            <div class="form-group-add-recipe">
                <label for="recipe_name">Recipe Name *</label>
                <input type="text" name="recipe_name" value="" placeholder="e.g. Spaghetti Carbonara">
            </div>

            <div class="form-group-add-recipe">
                <label for="course">Course *</label>
                <select id="course" name="course" required>
                    <option value="">-- Select course --</option>
                    <option value="appetizers" selected>Appetizers</option>
                    <option value="main course">Main Course</option>
                    <option value="dessert">Dessert</option>
                </select>
            </div>

            <div class="form-group-add-recipe">
                <label for="description">Description *</label>
                <textarea id="description" name="description" required placeholder="Describe the recipe..."></textarea>
            </div>
        </div>

        <div class="form-card">
            <h3>Ingredients</h3>
            <p class="ingredients-subtitle">Update the name and quantity for each ingredient.</p>

            <table class="ingredients-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Ingredient Name *</th>
                        <th>Quantity *</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td><input type="text" name="ing_name_1" value="" placeholder="e.g. Flour" required></td>
                        <td><input type="text" name="ing_qty_1"  value="" placeholder="e.g. 200g" required></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><input type="text" name="ing_name_2" value="" placeholder="e.g. Eggs"></td>
                        <td><input type="text" name="ing_qty_2"  value="" placeholder="e.g. 3"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="form-actions-row">
            <button type="submit" class="btn-submit">Save Changes</button>
            <a href="manage_recipes.html" class="btn-cancel">Cancel</a>
        </div>

    </form>
</main>

</body>
</html>
