<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratatoulle | Recipe Detail</title>
    <link href="src/styles.css" rel="stylesheet">
    <script src="src/recipe_details.js" defer></script>
</head>
<body>
  <nav class="nav-bar-user">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Browse</a></li>
      <li><a href="favorites.html">Favorites</a></li>
      <li><a href="login.html">Log Out</a></li>
    </ul>

    <main class="recipe-detail-main">

        <h1 id="recipe-name"></h1>
        <p><b>Course:</b> <span id="recipe-course"></span></p>
        <p id="recipe-description"></p>

        <h3>Ingredients</h3>
        <table class="favorites-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="recipe-ingredients"></tbody>
        </table>

        <br>
        <form id="add-fav-form">
            <input type="submit" value="Add to Favorites">
        </form>

        <br>
        <a href="search.html">Back to Browse</a>

    </main>
