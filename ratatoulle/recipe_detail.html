<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratatoulle | Recipe Detail</title>
    <link href="src/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="nav-bar-user">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Browse</a></li>
      <li><a href="favorites.html">Favorites</a></li>
      <li><a href="login.html">Log Out</a></li>
    </ul>
  </nav>

    <main class="recipe-detail-main">

        <h1 id="recipe-name"></h1>
        <p><b>Course:</b> <span id="recipe-course"></span></p>
        <p id="recipe-description"></p>

        <h3>Ingredients</h3>
        <table class="favorites-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="recipe-ingredients"></tbody>
        </table>

        <br>
        <form id="add-fav-form">
            <input type="submit" value="Add to Favorites">
        </form>

        <br>
        <a href="search.html">Back to Browse</a>

    </main>

<script>
    const recipeName = new URLSearchParams(window.location.search).get('name');
    const recipes = JSON.parse(localStorage.getItem('recipesArr') || '[]');
    const recipe = recipes.find(r => r.name === recipeName);

    if (recipe) {
        document.getElementById('recipe-name').textContent = recipe.name;
        document.getElementById('recipe-course').textContent = recipe.course;
        document.getElementById('recipe-description').textContent = recipe.description;

        const tbody = document.getElementById('recipe-ingredients');
        recipe.ingredients.forEach((ing, i) => {
            if (!ing.name.trim()) return;
            tbody.innerHTML += `<tr><td>${i + 1}</td><td>${ing.name}</td><td>${ing.quantity}</td></tr>`;
        });
    } else {
        document.querySelector('.recipe-detail-main').innerHTML = "<h1>Recipe not found</h1><a href='search.html'>Back to Browse</a>";
    }

    document.getElementById('add-fav-form').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!recipe) return;

        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        // check if already added
        if (favorites.some(f => f.name === recipe.name)) {
            alert("This recipe is already in your favorites!");
        } else {
            favorites.push(recipe);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            alert("Added to Favorites!");
        }
    });
</script>
</body>
</html>
