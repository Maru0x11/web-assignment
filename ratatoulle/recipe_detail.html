<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratatoulle | Recipe Detail</title>
    <link href="src/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="nav-bar-user">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Browse</a></li>
      <li><a href="favorites.html">Favourites</a></li>
      <li><a href="login.html">Log Out</a></li>
    </ul>
  </nav>

    <main style="max-width: 700px; margin: auto;">

        <h1 id="recipe-name"></h1>
        <p><b>Course:</b> <span id="recipe-course"></span></p>
        <p id="recipe-description"></p>

        <h3>Ingredients</h3>
        <table border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Ingredient</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody id="recipe-ingredients"></tbody>
        </table>

        <br>
        <form action="favorites.html" method="post">
            <input type="hidden" name="recipe_id" value="">
            <input type="submit" value="Add to Favorites">
        </form>

        <br>
        <a href="search.html">Back to Browse</a>

    </main>

    <script>
        const id = parseInt(new URLSearchParams(window.location.search).get('id'));
        const recipe = JSON.parse(localStorage.getItem('recipesArr') || '[]')[id];

        if (recipe) {
            document.getElementById('recipe-name').textContent = recipe.name;
            document.getElementById('recipe-course').textContent = recipe.course;
            document.getElementById('recipe-description').textContent = recipe.description;

            const tbody = document.getElementById('recipe-ingredients');
            recipe.ingredients.forEach((ing, i) => {
                if (!ing.name.trim()) return;
                tbody.innerHTML += `<tr><td>${i + 1}</td><td>${ing.name}</td><td>${ing.quantity}</td></tr>`;
            });
        }
    </script>
</body>
</html>
