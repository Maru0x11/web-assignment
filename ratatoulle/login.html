<html>

<head>
    <title>Ratatoulle | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href="src/styles.css" rel="stylesheet">
</head>

<body>
  <nav class="nav-bar-login">
    <ul>
      <li><a href="login.html">Log In</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </nav>
    <hr>

    <main class="login-main">
  <div class="login-card">
    <h2>Login</h2>
    <p id="error-message"></p>

    <div class="login-form-group">
      <label for="username">Username / Email</label>
      <input type="text" id="username" name="username" placeholder="Bo0oda / abcd@gmail.com">
    </div>
    <div class="login-form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••">
    </div>

    <button type="submit" class="btn-login" form="user-form">Login as User</button>

    <div class="login-divider"><span>or</span></div>

    <button type="submit" class="btn-login-admin" form="admin-form">Login as Admin</button>

    <div class="login-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>

  <form id="user-form"></form>
  <form id="admin-form"></form>
</main>
<script src="src/login.js"></script>
</body>

</html>
