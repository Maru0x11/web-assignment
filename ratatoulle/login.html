<html>

<head>
    <title>Ratatoulle | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div {
            margin: 10px;
        }

        form {
            font-size: 20px
        }

        input {
            font-size: 18px;
            padding: 3px;
        }
    </style>
</head>

<body>
   
    <iframe src="nav.html" width="100%" height="60" style="border:none; overflow:hidden;"></iframe>
    <hr>
    
    <main style="max-width:500px ;  margin: auto; text-align: center; margin-top: 100px; height: auto; ">
        <div>
            <h2>Login</h2>
            <form action="index.html" method="post"> <div>
                    <label for="username" style="margin-right: 90px;">username/email:</label> <br>
                    <input type="text" id="username" name="username" placeholder="Bo0oda/abcd@gmail.com">
                </div>
                
                <div>
                    <label for="password" style="margin-right: 140px;"> password:</label> <br>
                    <input type="password" id="password" name="password" placeholder="@#$%^&*!">
                </div>

                <div>
                    <input type="submit" value="Login">
                </div>
            </form>
            
            <br>
            <label>Don't have an account? </label>
            <a href="signup.html"> sign up</a>
        </div>
    </main>
</body>

</html>
