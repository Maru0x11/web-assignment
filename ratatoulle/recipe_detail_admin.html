<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ratatoulle | Recipe Detail (Admin)</title>
    <link href="src/styles.css" rel="stylesheet">
    <script type="module" src="src/delete_recipe.js"></script>
</head>
<body>

<nav class="nav-bar-admin">
    <ul>
      <li><a href="index_admin.html">Home</a></li>
      <li><a href="manage_recipes.html">Manage Recipes</a></li>
      <li><a href="add_recipe.html">Add Recipes</a></li>
      <li><a href="login.html">Log Out</a></li>
    </ul>
</nav>

<main class="recipe-detail-main">

    <h1 id="detail-name"></h1>
    <p><b>Course:</b> <span id="detail-course"></span></p>
    <p id="detail-description"></p>

    <h3>Ingredients</h3>
    <table class="favorites-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Ingredient</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody id="detail-ingredients"></tbody>
    </table>

    <br>
    <a id="edit-link" href="add_recipe.html">Edit Recipe</a>
    &nbsp;
    <div style="display:inline;">
        <form class="delete-recipe-form" style="display:inline;">
            <input type="hidden" class="recipe_id" value="">
            <input type="submit" class="btn-delete-detail-admin" value="Delete Recipe">
        </form>
    </div>

    <br><br>
    <a href="manage_recipes.html">Back to Manage Recipes</a>

</main>

<script>
    const id = parseInt(new URLSearchParams(window.location.search).get('id'));
    const recipe = JSON.parse(localStorage.getItem('recipesArr') || '[]')[id];

    if (recipe) {
        document.getElementById('detail-name').textContent = recipe.name;
        document.getElementById('detail-course').textContent = recipe.course;
        document.getElementById('detail-description').textContent = recipe.description;

        document.querySelector('.recipe_id').value = id;
        document.getElementById('edit-link').href = 'add_recipe.html?id=' + id;

        const tbody = document.getElementById('detail-ingredients');
        recipe.ingredients.forEach((ing, i) => {
            if (!ing.name.trim()) return;
            tbody.innerHTML += `<tr><td>${i + 1}</td><td>${ing.name}</td><td>${ing.quantity}</td></tr>`;
        });
    } else {
        document.querySelector('.recipe-detail-main').innerHTML = "<h1>Recipe not found</h1><a href='manage_recipes.html'>Back to Manage</a>";
    }
</script>
</body>
</html>
