<!DOCTYPE html>
<html>

<head>
    <title>Ratatoulle | sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div {
            margin: 10px;
        }

        form {
            font-size: 20px
        }

        input {
            font-size: 18px;
            padding: 3px;
        }
    </style>
     <link href="src/styles.css" rel="stylesheet"
</head>

<body>
   <nav class="nav-bar-login">
    <ul class="nav-login-ul">
      <li><a href="login.html">Log In</a></li>
      <li><a href="signup.html">Sign Up</a></li>
    </ul>
  </nav>
   <main class="signup-main">
  <div class="signup-card">
    <h2>Sign Up</h2>
    <p id="error-message"></p>
    <form>
      <div class="signup-form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Dula" required>
      </div>
      <div class="signup-form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" placeholder="example@gmail.com" required>
      </div>
      <div class="signup-form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••" required>
      </div>
      <div class="signup-form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••" required>
      </div>
      <div class="signup-checkbox-group">
        <input type="checkbox" name="admin" id="admin">
        <label for="admin">is_admin</label>
      </div>
      <button type="submit" class="btn-signup-submit">Sign Up</button>
    </form>
    <div class="signup-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</main>
<script src="src/signup.js"></script>
</body>

</html>
