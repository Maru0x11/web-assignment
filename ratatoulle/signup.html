<!DOCTYPE html>
<html>

<head>
    <title>Ratatoulle | sign up</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        div {
            margin: 10px;
        }

        form {
            font-size: 20px
        }

        input {
            font-size: 18px;
            padding: 3px;
        }
    </style>
</head>

<body>
   
    <iframe src="nav.html" width="100%" height="60" style="border:none; overflow:hidden;"></iframe>
    <hr>

    <main style="max-width:500px ;  margin: auto; text-align: center; margin-top: 100px; height: auto; ">
        <div>
            <h2>sign up</h2>
            <form>
                <div>
                    <label for="username" style="margin-right: 110px;">username:</label> <br>
                    <input type="text" id="username" name="username" placeholder="Dula" required>
                </div>
                <div>
                    <label for="email" style="margin-right: 150px;">email:</label> <br>
                    <input type="text" id="email" name="email" placeholder="example@gmail.com" required>
                </div>
                <div>
                    <label for="password" style="margin-right: 110px;"> password:</label> <br>
                    <input type="password" id="password" name="password" placeholder="******" required>
                </div>
                <div>
                    <label for="confirm" style="margin-right: 40px;"> confirm password:</label> <br>
                    <input type="password" id="confirm" name="confirm"  placeholder="******" required>
                </div>
                <div>
                    <label for="admin" style="font-size: smaller; ">is_admin</label>
                    <input type="checkbox" name="admin" id="admin" style="margin-right: 20px; ">
                    <input type="submit" value="sign up">
                </div>


            </form>
            <label>already have account ? </label>
            <a href="login.html"> login</a>
        </div>
    </main>
</body>

</html>
